name: iOS Build

# Compile-verifies the CSQJek app on a macOS runner. This is the safety net for
# the improvement loop: Claude can't run Xcode in its Linux session, so every PR
# is built here before it reaches the reviewer's Mac.

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS 17 Simulator)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('CSQJek.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project CSQJek.xcodeproj \
            -scheme CSQJek \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project CSQJek.xcodeproj \
            -scheme CSQJek \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
